<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المساعد الدراسي الذكي PRO 🎓</title>
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2997/2997312.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body { background: #f8fafc; font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden; }
        .card { background: white; border-radius: 24px; padding: 1.5rem; transition: 0.3s; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
        .btn-main { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); color: white; border-radius: 18px; padding: 1rem; font-weight: bold; transition: 0.2s; cursor: pointer; text-align: center; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); z-index: 1000; align-items: center; justify-content: center; }
        .beast-modal-content { background: white; padding: 2.5rem; border-radius: 32px; border: 4px solid #f97316; animation: beastIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes beastIn { from { transform: scale(0); rotate: -10deg; } to { transform: scale(1); rotate: 0deg; } }
        .study-active { border: 4px solid #6366f1; }
        .break-active { border: 4px solid #10b981; }
        .border-priority-1 { border: 6px solid #ef4444 !important; }
        .border-priority-2 { border: 5px solid #f97316 !important; }
        .border-priority-rest { border: 4px solid #a855f7 !important; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="beastModal" class="modal">
        <div class="beast-modal-content text-center max-w-sm">
            <div class="text-7xl mb-4">🦁</div>
            <h2 class="text-3xl font-black text-orange-600 mb-2">وحش يا <span id="beastName">بطل</span>!</h2>
            <p class="text-slate-600 font-bold mb-6">كسرنا حاجز الـ 20 صفحة، مكملين لحد ما نفرتك المادة! 🔥</p>
            <button onclick="closeBeastModal()" class="btn-main w-full bg-orange-500 py-4 text-xl">يلا بينا! 🚀</button>
        </div>
    </div>

    <div id="loginOverlay" class="fixed inset-0 bg-white flex items-center justify-center p-6 z-[2000] hidden">
        <div class="max-w-sm w-full text-center">
            <div class="text-6xl mb-6">🎓</div>
            <h2 class="text-3xl font-black text-slate-800 mb-2">أهلاً بك!</h2>
            <input id="userNameInput" type="text" placeholder="اكتب اسمك هنا..." class="w-full p-5 bg-slate-100 rounded-2xl mb-4 text-center text-xl outline-none border-2 focus:border-indigo-400">
            <button onclick="login()" class="btn-main w-full py-5 text-xl">دخول 🚀</button>
        </div>
    </div>

    <div id="iqModal" class="modal">
        <div class="card w-full max-w-sm text-center border-4 border-red-500">
            <h2 class="text-2xl font-bold text-red-600 mb-4">⚠️ فك الشفرة للراحة</h2>
            <p id="iqQuestion" class="text-3xl mb-6 font-black text-slate-800 text-center"></p>
            <input id="iqAnswer" type="number" class="w-full p-4 bg-slate-100 rounded-2xl mb-4 text-center text-3xl font-bold">
            <button onclick="checkIQ()" class="btn-main w-full bg-red-600">تأكيد ✅</button>
        </div>
    </div>

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div class="text-right">
                <h1 class="text-4xl font-black text-slate-900 mb-1">المساعد الذكي <span class="text-indigo-600">PRO</span></h1>
                <p id="welcomeMsg" class="text-slate-500 font-bold text-lg"></p>
            </div>
            <button onclick="logout()" class="text-slate-400 font-bold">👤 خروج</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-12">
            <div id="timerCard" class="card text-center flex flex-col justify-center relative overflow-hidden">
                <div id="statusLabel" class="text-xs font-black uppercase tracking-widest text-indigo-500 mb-2">اختر مادة</div>
                <div id="timerDisp" class="text-8xl font-black text-slate-800 mb-8 tracking-tighter">00:00</div>
                <div id="sessionInfo" class="text-slate-400 text-sm mb-6 font-bold leading-relaxed text-center">بانتظار الضغط على "ابدأ الجلسة"</div>
                
                <div class="flex flex-col gap-3">
                    <button id="timerBtn" onclick="toggleTimer()" class="btn-main py-5 text-xl shadow-lg">ابدأ الجلسة ▶️</button>
                    <button id="beBeastBtn" onclick="beBeast()" class="hidden w-full py-4 bg-orange-100 text-orange-600 rounded-xl font-black border-2 border-orange-300">أنا وحش وهقدر أذاكر أكتر! 🔥</button>
                    <button onclick="skipSession()" class="text-slate-300 text-xs mt-2 hover:text-indigo-500">تخطي الوقت (للتجربة)</button>
                </div>
                <button id="stopBtn" onclick="triggerAlarmStop()" class="hidden w-full mt-4 bg-red-600 text-white py-5 rounded-2xl font-black animate-pulse">إيقاف الإنذار 🔕</button>
            </div>

            <div class="card border-t-6 border-indigo-400 text-right">
                <h2 class="text-slate-800 font-black text-xl mb-6">➕ إضافة مادة</h2>
                <div class="space-y-4">
                    <input id="subName" type="text" placeholder="اسم المادة" class="w-full p-5 bg-slate-50 rounded-2xl outline-none text-center border-2 border-transparent focus:border-indigo-400">
                    <div class="grid grid-cols-2 gap-4">
                        <input id="subPgs" type="number" placeholder="عدد الصفحات" class="p-5 bg-slate-50 rounded-2xl text-center">
                        <input id="subDate" type="date" class="p-5 bg-slate-50 rounded-2xl text-center text-xs">
                    </div>
                    <button onclick="addSub()" class="btn-main w-full py-5 shadow-xl">تثبيت في الجدول 📌</button>
                </div>
            </div>
        </div>

        <div class="w-full">
            <h2 class="text-2xl font-black text-slate-800 mb-6 text-right">📅 جدول الأولويات</h2>
            <div id="subjectsList" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 pb-20"></div>
        </div>
    </div>

    <audio id="bellSound" src="https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3" loop></audio>
    <audio id="cheerSound" src="https://assets.mixkit.co/active_storage/sfx/2020/2020-preview.mp3"></audio>

    <script>
        let user = JSON.parse(localStorage.getItem('study_user')) || null;
        let subjects = [];
        let timerInterval = null; 
        let isBreak = false;
        let currentIqAnswer = null;
        let activeSubId = localStorage.getItem('active_sub_id') || null;
        let dailyPagesDone = parseInt(localStorage.getItem('daily_pages_done')) || 0;
        let isBeastMode = JSON.parse(localStorage.getItem('beast_mode')) || false;

        window.onload = () => { 
            if (!user) document.getElementById('loginOverlay').classList.remove('hidden'); 
            else {
                setupUser();
                if (localStorage.getItem('timer_end_time')) runUIUpdate();
            }
        };

        function login() {
            const name = document.getElementById('userNameInput').value;
            if (!name) return alert("من فضلك ادخل اسمك");
            user = { name: name };
            localStorage.setItem('study_user', JSON.stringify(user));
            document.getElementById('loginOverlay').classList.add('hidden');
            setupUser();
        }

        function setupUser() {
            document.getElementById('welcomeMsg').innerText = `منور يا ${user.name} 👋`;
            subjects = JSON.parse(localStorage.getItem(`subs_${user.name}`)) || [];
            renderSubjects();
        }

        function logout() { localStorage.clear(); location.reload(); }

        function addSub() {
            const n = document.getElementById('subName').value, p = parseInt(document.getElementById('subPgs').value), d = document.getElementById('subDate').value;
            if(!n || !p || !d) return alert("كمل البيانات!");
            subjects.push({ n, p, d, id: Date.now() });
            saveAndRender();
            document.getElementById('subName').value = ''; document.getElementById('subPgs').value = '';
        }

        function saveAndRender() {
            subjects.sort((a, b) => new Date(a.d) - new Date(b.d));
            localStorage.setItem(`subs_${user.name}`, JSON.stringify(subjects));
            renderSubjects();
        }

        function renderSubjects() {
            const container = document.getElementById('subjectsList');
            container.innerHTML = '';
            subjects.forEach((s, index) => {
                const days = Math.ceil((new Date(s.d) - new Date())/(1000*60*60*24));
                let pClass = index === 0 ? "border-priority-1" : (index === 1 ? "border-priority-2" : "border-priority-rest");
                container.innerHTML += `
                    <div class="card ${pClass} hover:translate-y-[-2px] transition-all cursor-pointer" onclick="selectSubject(${s.id})">
                        <div class="flex justify-between items-start mb-4">
                            <div class="text-right"><h3 class="text-2xl font-black text-slate-800">${s.n}</h3><p class="text-slate-400 font-bold text-sm">📅 باقي ${days > 0 ? days : 0} يوم</p></div>
                            <span class="bg-indigo-50 text-indigo-600 p-2 rounded-xl text-xs font-black">${s.p} صفحة</span>
                        </div>
                        <button onclick="event.stopPropagation(); finishSubject(${s.id})" class="w-full py-3 bg-green-50 text-green-600 rounded-xl font-bold hover:bg-green-600 hover:text-white transition">أنا خلصت المادة ✅</button>
                    </div>`;
            });
        }

        function selectSubject(id) {
            activeSubId = id;
            localStorage.setItem('active_sub_id', id);
            const sub = subjects.find(s => s.id == id);
            
            if (dailyPagesDone >= 20 && !isBeastMode) {
                document.getElementById('sessionInfo').innerText = `🛑 خلصت الـ 20 صفحة بتوع النهاردة يا بطل!\nارتاح وكمل بكرة أو دوس "أنا وحش" لو لسه فيك طاقة.`;
                document.getElementById('timerBtn').classList.add('hidden');
                document.getElementById('beBeastBtn').classList.remove('hidden');
                document.getElementById('timerDisp').innerText = "DONE";
                return;
            }

            document.getElementById('sessionInfo').innerText = `المادة: ${sub ? sub.n : 'بدون اسم'}\nمستعد تبدأ الـ 5 صفحات؟`;
            document.getElementById('timerBtn').classList.remove('hidden');
            document.getElementById('beBeastBtn').classList.add('hidden');
            document.getElementById('timerDisp').innerText = "60:00";
        }

        function toggleTimer() {
            if(!activeSubId) return alert("اختر مادة أولاً من الجدول");
            isBreak = false;
            localStorage.setItem('timer_is_break', false);
            startTimer(60 * 60); 
            document.getElementById('timerBtn').classList.add('hidden');
            document.getElementById('statusLabel').innerText = "وضع المذاكرة 📖";
            document.getElementById('timerCard').className = "card text-center flex flex-col justify-center relative overflow-hidden study-active";
        }

        function startTimer(duration) {
            const endTime = Date.now() + (duration * 1000);
            localStorage.setItem('timer_end_time', endTime);
            runUIUpdate();
        }

        function runUIUpdate() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const endTime = localStorage.getItem('timer_end_time');
                if (!endTime) {
                    clearInterval(timerInterval);
                    return;
                }
                const diff = Math.ceil((endTime - Date.now()) / 1000);
                if (diff <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById('timerDisp').innerText = "00:00";
                    document.getElementById('bellSound').play();
                    document.getElementById('stopBtn').classList.remove('hidden');
                } else {
                    const m = Math.floor(diff / 60), s = diff % 60;
                    document.getElementById('timerDisp').innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                }
            }, 1000);
        }

        function triggerAlarmStop() {
            const n1 = Math.floor(Math.random() * 20) + 10, n2 = Math.floor(Math.random() * 20) + 10;
            currentIqAnswer = n1 + n2;
            document.getElementById('iqQuestion').innerText = `${n1} + ${n2}`;
            document.getElementById('iqModal').style.display = 'flex';
        }

        function checkIQ() {
            if(parseInt(document.getElementById('iqAnswer').value) === currentIqAnswer) {
                document.getElementById('bellSound').pause();
                document.getElementById('iqModal').style.display = 'none';
                document.getElementById('stopBtn').classList.add('hidden');
                
                isBreak = JSON.parse(localStorage.getItem('timer_is_break'));
                if (!isBreak) {
                    deductPages();
                    dailyPagesDone += 5;
                    localStorage.setItem('daily_pages_done', dailyPagesDone);
                }
                
                if (!isBreak) {
                    isBreak = true;
                    localStorage.setItem('timer_is_break', true);
                    const breakDuration = (dailyPagesDone % 10 === 0) ? 60 * 60 : 15 * 60;
                    startTimer(breakDuration);
                    document.getElementById('statusLabel').innerText = "وقت البريك ☕";
                    document.getElementById('sessionInfo').innerText = (dailyPagesDone % 10 === 0) ? "عاش! خلصت 10 صفحات، ليك ساعة بريك." : "بريك 15 دقيقة.. ارتاح شوية.";
                    document.getElementById('timerCard').className = "card text-center flex flex-col justify-center relative overflow-hidden break-active";
                } else {
                    stopEverything();
                    selectSubject(activeSubId);
                }
            } else alert("ركز يا وحش!");
        }

        function deductPages() {
            let sub = subjects.find(s => s.id == activeSubId);
            if (sub) { sub.p = Math.max(0, sub.p - 5); saveAndRender(); }
        }

        function stopEverything() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = null;
            localStorage.removeItem('timer_end_time');
            localStorage.removeItem('timer_is_break');
            document.getElementById('timerDisp').innerText = "00:00";
            document.getElementById('statusLabel').innerText = "اختر مادة";
            document.getElementById('timerCard').className = "card text-center flex flex-col justify-center relative overflow-hidden";
            document.getElementById('stopBtn').classList.add('hidden');
            document.getElementById('timerBtn').classList.remove('hidden');
            document.getElementById('bellSound').pause();
            document.getElementById('bellSound').currentTime = 0;
        }

        function finishSubject(id) {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            document.getElementById('cheerSound').play();
            
            if (activeSubId == id) {
                stopEverything();
                activeSubId = null;
                localStorage.removeItem('active_sub_id');
                document.getElementById('sessionInfo').innerText = "تم إنهاء المادة بنجاح! اختر مادة تانية.";
            }

            setTimeout(() => {
                subjects = subjects.filter(s => s.id !== id);
                saveAndRender();
            }, 500);
        }

        function beBeast() {
            isBeastMode = true;
            localStorage.setItem('beast_mode', true);
            document.getElementById('beastName').innerText = user.name;
            document.getElementById('beastModal').style.display = 'flex';
            confetti({ particleCount: 200, spread: 100 });
            document.getElementById('cheerSound').play();
            selectSubject(activeSubId);
        }

        function closeBeastModal() { document.getElementById('beastModal').style.display = 'none'; }
        function skipSession() { localStorage.setItem('timer_end_time', Date.now() + 1000); }
    </script>
</body>
</html>
