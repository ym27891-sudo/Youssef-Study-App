<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المساعد الدراسي الذكي Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f8fafc; font-family: 'Segoe UI', sans-serif; }
        .card { background: white; border-radius: 24px; box-shadow: 0 10px 30px -5px rgba(0,0,0,0.1); border-top: 6px solid #6366f1; transition: 0.3s; }
        .btn-grad { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); color: white; transition: 0.2s; cursor: pointer; border: none; }
        .btn-grad:hover { opacity: 0.9; transform: translateY(-2px); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 200; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 2rem; border-radius: 30px; width: 90%; max-width: 400px; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .pulse-timer { animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="p-4 bg-slate-50">

    <div id="loginOverlay" class="fixed inset-0 bg-slate-50 flex items-center justify-center p-6 z-[300] hidden">
        <div class="card p-8 w-full max-w-md text-center">
            <h2 class="text-2xl font-bold mb-6 text-slate-800">أهلاً بك يا بطل! 🎓</h2>
            <input id="userName" type="text" placeholder="اسمك الكريم" class="w-full p-4 mb-3 border-2 border-slate-100 rounded-2xl outline-none focus:border-indigo-400">
            <button onclick="saveUser()" class="btn-grad w-full py-4 rounded-2xl text-lg font-bold">دخول 🚀</button>
        </div>
    </div>

    <div id="subModal" class="modal">
        <div class="modal-content text-center">
            <div class="text-4xl mb-4 text-indigo-500 font-bold" id="modalSubName"></div>
            <p class="text-slate-500 mb-6 text-sm">عايز تخطط لمذاكرة المادة دي إزاي؟</p>
            <div class="space-y-3">
                <button onclick="getSpecificAI('today')" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-200">النهاردة فقط (خطة بالساعات) 🔥</button>
                <button onclick="getSpecificAI('longterm')" class="w-full py-4 bg-slate-100 text-slate-700 rounded-2xl font-bold">على مدار الأيام المتبقية 📅</button>
                <button onclick="closeModal()" class="text-slate-400 text-sm mt-4 inline-block">إلغاء</button>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto">
        <header class="text-center mb-6">
            <h1 class="text-3xl font-black text-slate-800 tracking-tight">المساعد الذكي</h1>
            <p id="welcomeMsg" class="text-indigo-600 font-bold mt-1 text-sm"></p>
        </header>

        <div class="card p-6 text-center mb-6 relative overflow-hidden">
            <div id="alarmStatus" class="hidden absolute top-2 right-2 text-red-500 font-bold text-[10px] pulse-timer">ALARM ON!</div>
            <div class="flex justify-center items-center gap-2 mb-4">
                <input id="customMinutes" type="number" value="25" class="w-16 p-2 text-center bg-slate-50 border rounded-xl text-lg font-black text-indigo-600">
                <span class="text-slate-400 font-bold text-xs">دقيقة</span>
            </div>
            <div id="timerDisp" class="text-6xl font-black text-slate-800 mb-6">25:00</div>
            <div class="flex gap-2">
                <button id="timerBtn" onclick="toggleTimer()" class="flex-[2] py-4 bg-slate-800 text-white rounded-2xl font-bold">ابدأ ▶️</button>
                <button onclick="stopAlarm()" id="stopAlarmBtn" class="flex-[2] py-4 bg-red-500 text-white rounded-2xl font-bold hidden pulse-timer text-sm">إسكات الإنذار 🔕</button>
                <button onclick="resetTimer()" class="flex-1 py-4 bg-slate-100 text-slate-400 rounded-2xl font-bold">🔄</button>
            </div>
        </div>

        <div class="card p-6 mb-6">
            <h2 class="font-bold text-slate-700 mb-4 flex items-center gap-2 text-sm"><span>📦</span> مادة جديدة</h2>
            <div class="space-y-3">
                <input id="subName" type="text" placeholder="اسم المادة" class="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-400 border-none">
                <div class="flex gap-2">
                    <input id="subPgs" type="number" placeholder="صفحات" class="w-1/2 p-4 bg-slate-50 rounded-2xl outline-none border-none">
                    <input id="subDate" type="date" class="w-1/2 p-4 bg-slate-50 rounded-2xl outline-none border-none text-xs">
                </div>
                <button onclick="addSub()" class="btn-grad w-full py-4 rounded-2xl font-bold shadow-lg">إضافة ➕</button>
            </div>
        </div>

        <div class="card p-6 bg-indigo-50 border-indigo-200">
            <h2 class="font-bold text-indigo-900 mb-2 flex items-center gap-2">🪄 عبقري Gemini</h2>
            <p class="text-[10px] text-indigo-600 mb-4">اضغط على المادة عشان يخطط لها لوحدها، أو اطلب جدول لكل المواد:</p>
            <button onclick="getSpecificAI('general')" class="w-full py-3 bg-white text-indigo-600 border-2 border-indigo-200 rounded-xl font-black shadow-sm">جدول شامل لكل المواد 🚀</button>
            <div id="aiResponse" class="mt-4 text-xs leading-relaxed text-slate-700 bg-white p-4 rounded-2xl border border-indigo-100 hidden shadow-inner max-h-80 overflow-y-auto"></div>
        </div>

        <div id="subjectsList" class="mt-6 space-y-3 pb-20"></div>
    </div>

    <audio id="bellSound" src="https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3" loop></audio>

    <script>
        let currentUser = JSON.parse(localStorage.getItem('study_pro_user'));
        let subjects = JSON.parse(localStorage.getItem('study_pro_subs')) || [];
        let timerInterval, remainingTime, selectedSubIndex = null;

        window.onload = () => { if (!currentUser) document.getElementById('loginOverlay').classList.remove('hidden'); else showMain(); };

        function saveUser() {
            const name = document.getElementById('userName').value;
            if (!name) return alert('اسمك إيه يا بطل؟');
            currentUser = { name };
            localStorage.setItem('study_pro_user', JSON.stringify(currentUser));
            document.getElementById('loginOverlay').classList.add('hidden');
            showMain();
        }

        function showMain() {
            document.getElementById('welcomeMsg').innerText = `منور يا ${currentUser.name.split(' ')[0]} 👋`;
            renderSubjects();
        }

        function addSub() {
            const n = document.getElementById('subName').value, p = document.getElementById('subPgs').value, d = document.getElementById('subDate').value;
            if (!n || !p || !d) return alert('كمل البيانات!');
            subjects.push({ n, p, d });
            localStorage.setItem('study_pro_subs', JSON.stringify(subjects));
            document.getElementById('subName').value = ''; document.getElementById('subPgs').value = '';
            renderSubjects();
        }

        function renderSubjects() {
            const container = document.getElementById('subjectsList');
            container.innerHTML = subjects.length > 0 ? '<h3 class="font-bold text-slate-400 text-[10px] mb-2 uppercase tracking-widest">اضغط على المادة للتخطيط</h3>' : '';
            subjects.forEach((s, i) => {
                const days = Math.ceil((new Date(s.d) - new Date()) / (1000 * 60 * 60 * 24));
                container.innerHTML += `
                    <div onclick="openModal(${i})" class="card p-4 border-t-0 border-r-8 border-indigo-500 flex justify-between items-center cursor-pointer hover:bg-slate-50 transition">
                        <div>
                            <b class="text-slate-800">${s.n}</b>
                            <p class="text-[10px] text-slate-400">${s.p} صفحة • باقي ${days > 0 ? days : 0} يوم</p>
                        </div>
                        <button onclick="event.stopPropagation(); removeSub(${i})" class="text-red-300 text-xs">✕</button>
                    </div>`;
            });
        }

        function openModal(i) { selectedSubIndex = i; document.getElementById('modalSubName').innerText = subjects[i].n; document.getElementById('subModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('subModal').style.display = 'none'; }
        function removeSub(i) { subjects.splice(i, 1); localStorage.setItem('study_pro_subs', JSON.stringify(subjects)); renderSubjects(); }

        // المنبه
        function toggleTimer() {
            const btn = document.getElementById('timerBtn');
            const customMin = document.getElementById('customMinutes').value;
            if (timerInterval) { clearInterval(timerInterval); timerInterval = null; btn.innerText = "استكمال ▶️"; }
            else {
                if (!remainingTime) remainingTime = customMin * 60;
                btn.innerText = "إيقاف ⏸️";
                timerInterval = setInterval(() => {
                    remainingTime--;
                    const m = Math.floor(remainingTime / 60), s = remainingTime % 60;
                    document.getElementById('timerDisp').innerText = `${m}:${s.toString().padStart(2, '0')}`;
                    if (remainingTime <= 0) { 
                        clearInterval(timerInterval);
                        document.getElementById('bellSound').play(); 
                        document.getElementById('stopAlarmBtn').classList.remove('hidden');
                        document.getElementById('timerBtn').classList.add('hidden');
                        document.getElementById('alarmStatus').classList.remove('hidden');
                    }
                }, 1000);
            }
        }
        function stopAlarm() { 
            const alarm = document.getElementById('bellSound'); alarm.pause(); alarm.currentTime = 0;
            document.getElementById('stopAlarmBtn').classList.add('hidden');
            document.getElementById('timerBtn').classList.remove('hidden');
            document.getElementById('alarmStatus').classList.add('hidden');
            resetTimer();
        }
        function resetTimer() { 
            clearInterval(timerInterval); timerInterval = null; remainingTime = null; 
            const customMin = document.getElementById('customMinutes').value;
            document.getElementById('timerDisp').innerText = `${customMin}:00`; 
            document.getElementById('timerBtn').innerText = "ابدأ ▶️"; 
        }

        // Gemini AI PRO - Updated with better error handling
        async function getSpecificAI(type) {
            closeModal();
            const resBox = document.getElementById('aiResponse');
            resBox.classList.remove('hidden');
            resBox.innerText = "جاري الاتصال بـ Gemini... خليك بطل وانتظر ثواني 🧠";
            
            let prompt = "";
            if (type === 'today') {
                const s = subjects[selectedSubIndex];
                prompt = `أنا اسمي ${currentUser.name}. عايز أذاكر مادة "${s.n}" اللي فيها ${s.p} صفحة النهاردة بس. اعملي جدول بالساعات لليوم ده، قولي أبدأ الساعة كام وأذاكر كام صفحة وأخد بريك قد إيه. بلهجة مصرية تشجيعية.`;
            } else if (type === 'longterm') {
                const s = subjects[selectedSubIndex];
                prompt = `أنا ${currentUser.name}. عندي مادة "${s.n}" فيها ${s.p} صفحة وامتحاني كمان ${Math.ceil((new Date(s.d) - new Date())/(1000*60*60*24))} يوم. وزعلي المادة دي على الأيام بذكاء. بلهجة مصرية.`;
            } else {
                prompt = `أنا ${currentUser.name}. عندي المواد دي: ${JSON.stringify(subjects)}. اعملي جدول شامل يراعي الامتحانات القريبة. بلهجة مصرية.`;
            }

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=AIzaSyCKpPdJmQUb_5Qr5HcLleZGdRm2hMVmg9I`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                if(data.candidates) {
                    resBox.innerText = data.candidates[0].content.parts[0].text;
                    resBox.scrollIntoView({ behavior: 'smooth' });
                } else { throw new Error(); }
            } catch (e) { resBox.innerText = "الخدمة عليها ضغط يا يوسف، دوس تاني وهتشتغل فوراً!"; }
        }
    </script>
</body>
</html>
