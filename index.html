<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المساعد الدراسي الذكي PRO 🎓</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body { background: #f8fafc; font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden; }
        .card { background: white; border-radius: 24px; padding: 1.5rem; transition: 0.3s; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
        .btn-main { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); color: white; border-radius: 18px; padding: 1rem; font-weight: bold; transition: 0.2s; cursor: pointer; text-align: center; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); z-index: 1000; align-items: center; justify-content: center; }
        .study-active { border: 4px solid #6366f1; animation: pulse-border 2s infinite; }
        .break-active { border: 4px solid #10b981; }
        
        /* ألوان الفريمات حسب الموعد */
        .border-danger { border: 5px solid #ef4444 !important; } /* أحمر */
        .border-warning { border: 5px solid #f97316 !important; } /* برتقالي */
        .border-safe { border: 5px solid #a855f7 !important; }    /* بنفسجي */

        @keyframes pulse-border { 0% { border-color: #6366f1; } 50% { border-color: #a855f7; } 100% { border-color: #6366f1; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="loginOverlay" class="fixed inset-0 bg-white flex items-center justify-center p-6 z-[2000] hidden">
        <div class="max-w-sm w-full text-center">
            <div class="text-6xl mb-6">🎓</div>
            <h2 class="text-3xl font-black text-slate-800 mb-2">أهلاً بك يا بطل!</h2>
            <p class="text-slate-500 mb-8">دخل اسمك عشان نبدأ ننظم جدولك</p>
            <input id="userNameInput" type="text" placeholder="اكتب اسمك هنا..." class="w-full p-5 bg-slate-100 rounded-2xl mb-4 text-center text-xl outline-none focus:ring-4 focus:ring-indigo-200">
            <button onclick="login()" class="btn-main w-full py-5 text-xl">ابدأ رحلتك 🚀</button>
        </div>
    </div>

    <div id="iqModal" class="modal">
        <div class="card w-full max-w-sm text-center border-4 border-red-500">
            <h2 class="text-2xl font-bold text-red-600 mb-4">⚠️ فك الشفرة عشان تقفل!</h2>
            <p id="iqQuestion" class="text-3xl mb-6 font-black tracking-widest text-slate-800"></p>
            <input id="iqAnswer" type="number" class="w-full p-4 bg-slate-100 rounded-2xl mb-4 text-center text-3xl font-bold">
            <button onclick="checkIQ()" class="btn-main w-full bg-red-600">تأكيد الإجابة ✅</button>
        </div>
    </div>

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div class="text-center md:text-right">
                <h1 class="text-4xl font-black text-slate-900 mb-1">المساعد الذكي <span class="text-indigo-600">PRO</span></h1>
                <p id="welcomeMsg" class="text-slate-500 font-bold text-lg"></p>
            </div>
            <button onclick="logout()" class="text-slate-400 hover:text-red-500 transition font-bold">تبديل المستخدم 👤</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-12">
            <div id="timerCard" class="card text-center flex flex-col justify-center relative overflow-hidden">
                <div id="statusLabel" class="text-xs font-black uppercase tracking-widest text-indigo-500 mb-2">في انتظارك..</div>
                <div id="timerDisp" class="text-8xl font-black text-slate-800 mb-8 tracking-tighter">00:00</div>
                <div id="sessionInfo" class="text-slate-400 text-sm mb-6 font-bold">اختر مادة من الجدول تحت عشان نبدأ</div>
                
                <div class="flex gap-3">
                    <button id="timerBtn" onclick="toggleTimer()" class="flex-[3] btn-main py-5 text-xl shadow-lg shadow-indigo-200">ابدأ الآن ▶️</button>
                    <button onclick="skipSession()" class="flex-1 bg-slate-100 text-slate-500 rounded-2xl font-bold hover:bg-slate-200">تخطي ⏭️</button>
                </div>
                <button id="stopBtn" onclick="triggerAlarmStop()" class="hidden w-full mt-4 bg-red-600 text-white py-5 rounded-2xl font-black animate-pulse">إسكات الإنذار 🔕</button>
            </div>

            <div class="card border-t-6 border-indigo-400">
                <h2 class="text-slate-800 font-black text-xl mb-6">➕ إضافة مادة للجدول</h2>
                <div class="space-y-4">
                    <div class="relative">
                        <input id="subName" type="text" placeholder="اسم المادة" class="w-full p-5 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-indigo-400 outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <input id="subPgs" type="number" placeholder="كم صفحة؟ (أقصى مادة 20)" class="p-5 bg-slate-50 rounded-2xl outline-none border-2 border-transparent focus:border-indigo-400">
                        <input id="subDate" type="date" class="p-5 bg-slate-50 rounded-2xl outline-none border-2 border-transparent focus:border-indigo-400 text-xs">
                    </div>
                    <button onclick="addSub()" class="btn-main w-full py-5 text-lg shadow-xl shadow-indigo-100">تثبيت في الجدول 📌</button>
                </div>
            </div>
        </div>

        <div class="w-full">
            <h2 class="text-2xl font-black text-slate-800 mb-6 flex items-center gap-3">
                📅 جدول موادك الدراسية
                <span id="subCount" class="text-sm bg-indigo-100 text-indigo-600 px-3 py-1 rounded-full">0</span>
            </h2>
            <div id="subjectsList" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 pb-20"></div>
        </div>
    </div>

    <audio id="bellSound" src="https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3" loop></audio>
    <audio id="cheerSound" src="https://assets.mixkit.co/active_storage/sfx/2020/2020-preview.mp3"></audio>

    <script>
        let user = JSON.parse(localStorage.getItem('study_user')) || null;
        let subjects = [];
        let timerInterval, remainingTime, isBreak = false, currentIqAnswer = null;
        let activeSub = null;

        window.onload = () => { if (!user) document.getElementById('loginOverlay').classList.remove('hidden'); else setupUser(); };

        function login() {
            const name = document.getElementById('userNameInput').value;
            if (!name) return alert("من فضلك ادخل اسمك");
            user = { name: name };
            localStorage.setItem('study_user', JSON.stringify(user));
            document.getElementById('loginOverlay').classList.add('hidden');
            setupUser();
        }

        function setupUser() {
            document.getElementById('welcomeMsg').innerText = `جاهز تفرتك الكتب يا ${user.name}؟ 🔥`;
            subjects = JSON.parse(localStorage.getItem(`subs_${user.name}`)) || [];
            renderSubjects();
        }

        function logout() { localStorage.removeItem('study_user'); location.reload(); }

        function addSub() {
            const n = document.getElementById('subName').value, p = parseInt(document.getElementById('subPgs').value), d = document.getElementById('subDate').value;
            if(!n || !p || !d) return alert("كمل البيانات يا وحش!");
            if(p > 20) return alert("يا بطل، أقصى مادة للمذاكرة هي 20 صفحة في اليوم عشان تركيزك ميقلش!");
            
            subjects.push({ n, p, d, id: Date.now() });
            saveAndRender();
            document.getElementById('subName').value = ''; document.getElementById('subPgs').value = '';
        }

        function saveAndRender() { localStorage.setItem(`subs_${user.name}`, JSON.stringify(subjects)); renderSubjects(); }

        function renderSubjects() {
            const container = document.getElementById('subjectsList');
            document.getElementById('subCount').innerText = subjects.length;
            container.innerHTML = '';
            
            if(subjects.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center p-20 text-slate-400 font-bold border-4 border-dashed rounded-3xl">الجدول فاضي.. ضيف مادة عشان نبدأ!</div>`;
                return;
            }

            subjects.forEach((s) => {
                const days = Math.ceil((new Date(s.d) - new Date())/(1000*60*60*24));
                let borderClass = "border-safe"; // بنفسجي افتراضي
                if (days <= 3) borderClass = "border-danger"; // أحمر
                else if (days <= 7) borderClass = "border-warning"; // برتقالي

                container.innerHTML += `
                    <div class="card ${borderClass} hover:translate-y-[-5px] transition-all cursor-pointer group" onclick="startSubjectPlan(${s.id})">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-2xl font-black text-slate-800 group-hover:text-indigo-600 transition">${s.n}</h3>
                                <p class="text-slate-400 font-bold text-sm">📅 باقي ${days > 0 ? days : 0} يوم</p>
                            </div>
                            <span class="bg-indigo-50 text-indigo-600 p-2 rounded-xl text-xs font-black">${s.p} صفحة</span>
                        </div>
                        <button onclick="event.stopPropagation(); finishSubject(${s.id})" class="w-full py-3 bg-green-50 text-green-600 rounded-xl font-bold hover:bg-green-600 hover:text-white transition">
                            أنا خلصت المادة دي ✅
                        </button>
                    </div>`;
            });
        }

        function finishSubject(id) {
            // تأثير البلالين
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            // صوت التشجيع
            document.getElementById('cheerSound').play();
            
            setTimeout(() => {
                subjects = subjects.filter(s => s.id !== id);
                saveAndRender();
            }, 1000);
        }

        function startSubjectPlan(id) {
            activeSub = subjects.find(s => s.id === id);
            isBreak = false;
            remainingTime = 60 * 60;
            updateTimerDisplay();
            document.getElementById('statusLabel').innerText = "وضع المذاكرة 📖";
            document.getElementById('sessionInfo').innerText = `المادة الحالية: ${activeSub.n}`;
            document.getElementById('timerCard').className = "card text-center flex flex-col justify-center relative overflow-hidden study-active";
        }

        function toggleTimer() {
            const btn = document.getElementById('timerBtn');
            if (timerInterval) { clearInterval(timerInterval); timerInterval = null; btn.innerText = "استكمال ▶️"; } 
            else {
                if(!remainingTime) return alert("اختر مادة أولاً");
                btn.innerText = "إيقاف مؤقت ⏸️";
                timerInterval = setInterval(() => {
                    remainingTime--;
                    updateTimerDisplay();
                    if(remainingTime <= 0) {
                        clearInterval(timerInterval);
                        document.getElementById('bellSound').play();
                        document.getElementById('stopBtn').classList.remove('hidden');
                        document.getElementById('timerBtn').classList.add('hidden');
                    }
                }, 1000);
            }
        }

        function updateTimerDisplay() {
            const m = Math.floor(remainingTime / 60), s = remainingTime % 60;
            document.getElementById('timerDisp').innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function skipSession() { if(!activeSub) return; remainingTime = 1; }

        function triggerAlarmStop() {
            const n1 = Math.floor(Math.random() * 30) + 10;
            const n2 = Math.floor(Math.random() * 30) + 10;
            currentIqAnswer = n1 + n2;
            document.getElementById('iqQuestion').innerText = `${n1} + ${n2}`;
            document.getElementById('iqModal').style.display = 'flex';
        }

        function checkIQ() {
            const ans = document.getElementById('iqAnswer').value;
            if(parseInt(ans) === currentIqAnswer) {
                document.getElementById('bellSound').pause();
                document.getElementById('bellSound').currentTime = 0;
                document.getElementById('iqModal').style.display = 'none';
                document.getElementById('stopBtn').classList.add('hidden');
                document.getElementById('timerBtn').classList.remove('hidden');
                document.getElementById('iqAnswer').value = '';
                nextPhase();
            } else { alert("غلط! ركز يا بطل"); }
        }

        function nextPhase() {
            const timerCard = document.getElementById('timerCard');
            if(!isBreak) {
                isBreak = true;
                remainingTime = 15 * 60;
                document.getElementById('statusLabel').innerText = "وقت البريك ☕";
                timerCard.className = "card text-center flex flex-col justify-center relative overflow-hidden break-active";
            } else {
                isBreak = false;
                remainingTime = 60 * 60;
                document.getElementById('statusLabel').innerText = "رجعنا للمذاكرة ✍️";
                timerCard.className = "card text-center flex flex-col justify-center relative overflow-hidden study-active";
            }
            updateTimerDisplay();
            document.getElementById('timerBtn').innerText = "ابدأ الجلسة ▶️";
        }
    </script>
</body>
</html>
